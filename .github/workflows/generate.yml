name: Generate OpenAPI Spec

on:
  workflow_dispatch:
  push:
    paths:
      - 'spec/**'
      - 'tspconfig.yaml'
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.DOWNSTREAM_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm run build

      - name: Commit updated spec
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openapi/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: regenerate OpenAPI spec"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger docs spec sync
        if: steps.commit.outputs.changed == 'true' && env.GH_TOKEN != ''
        run: gh workflow run sync-spec.yml --repo Blurware/vidjutsu-docs
        env:
          GH_TOKEN: ${{ secrets.DOWNSTREAM_PAT }}

      - name: Trigger vidjutsu spec validation
        if: steps.commit.outputs.changed == 'true' && env.GH_TOKEN != ''
        run: gh workflow run preview.yml --repo tfcbot/vidjutsu
        env:
          GH_TOKEN: ${{ secrets.DOWNSTREAM_PAT }}

      - name: Trigger CLI spec sync
        if: steps.commit.outputs.changed == 'true' && env.GH_TOKEN != ''
        run: gh workflow run sync-spec.yml --repo tfcbot/vidjutsu-cli
        env:
          GH_TOKEN: ${{ secrets.DOWNSTREAM_PAT }}

      - name: Trigger SDK spec sync
        if: steps.commit.outputs.changed == 'true' && env.GH_TOKEN != ''
        run: gh workflow run sync-spec.yml --repo tfcbot/vidjutsu-sdk
        env:
          GH_TOKEN: ${{ secrets.DOWNSTREAM_PAT }}
